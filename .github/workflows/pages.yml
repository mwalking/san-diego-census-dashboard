name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PAGES_ENABLEMENT_TOKEN: ${{ secrets.PAGES_ENABLEMENT_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure Pages (auto-enable)
        if: ${{ env.PAGES_ENABLEMENT_TOKEN != '' }}
        uses: actions/configure-pages@v5
        with:
          token: ${{ env.PAGES_ENABLEMENT_TOKEN }}
          enablement: true

      - name: Configure Pages
        if: ${{ env.PAGES_ENABLEMENT_TOKEN == '' }}
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Verify project
        run: npm run verify

      - name: Assert committed data artifacts exist
        run: |
          test -f public/data/years.json
          test -f public/data/years.json.gz
          test -f public/data/metadata.json
          test -f public/data/metadata.json.gz
          test -f public/data/variables.json
          test -f public/data/variables.json.gz
          test -f public/data/tracts/tracts.geojson
          test -f public/data/tracts/tracts.geojson.gz
          test -f public/data/hexes/2022.json
          test -f public/data/hexes/2023.json
          test -f public/data/hexes/2024.json
          test -f public/data/hexes/2022.json.gz
          test -f public/data/hexes/2023.json.gz
          test -f public/data/hexes/2024.json.gz

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
